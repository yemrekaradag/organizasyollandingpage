# Organizasyol landing page — nginx yapılandırması
# SPA (React Router) için deep-link fallback + statik varlıklar için cache politikası.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Sıkıştırma (Best Practices: metin varlıkları için) ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Hash'li build varlıkları: uzun süreli, değişmez cache ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- Diğer statik varlıklar (favicon, og-image, fontlar) ---
    location ~* \.(?:svg|png|jpe?g|webp|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- sitemap.xml / robots.txt açıkça servis edilir ---
    location = /sitemap.xml { add_header Cache-Control "public, max-age=3600"; }
    location = /robots.txt  { add_header Cache-Control "public, max-age=3600"; }

    # --- SPA fallback: bilinmeyen yollar index.html'e döner (blog deep-linkleri 200) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
